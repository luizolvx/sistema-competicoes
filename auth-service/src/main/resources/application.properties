# Nome da aplicação
spring.application.name=auth-service

# Porta do servidor (O monólito roda na 8080, então este deve rodar na 8081)
server.port=8081

# Configurações do Banco de Dados (Copie exatamente como está no monólito)
spring.datasource.url=jdbc:mysql://localhost:3306/competicoes_db?createDatabaseIfNotExist=true
spring.datasource.username=seu_usuario
spring.datasource.password=sua_senha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# A CHAVE DE OURO: O segredo do JWT DEVE ser exatamente o mesmo do monólito!
jwt.secret=cole_aqui_a_mesma_chave_secreta_que_esta_no_monolito
jwt.expiration=86400000